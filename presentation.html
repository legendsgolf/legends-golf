<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Presentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            color: #1e3c72;
            font-size: 36px;
            margin-bottom: 10px;
        }

        .tournament-name {
            color: #667eea;
            font-size: 24px;
            font-weight: bold;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .tab-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 24px;
            background: #e9ecef;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #2a5298;
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: center;
        }

        select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            min-width: 300px;
        }

        .winner-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .winner-section h2 {
            font-size: 28px;
            margin-bottom: 20px;
            text-align: center;
        }

        .podium {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .podium-place {
            background: rgba(255,255,255,0.15);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .podium-place.first {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #333;
            transform: scale(1.05);
        }

        .podium-place.second {
            background: linear-gradient(135deg, #c0c0c0 0%, #e8e8e8 100%);
            color: #333;
        }

        .podium-place.third {
            background: linear-gradient(135deg, #cd7f32 0%, #e8a87c 100%);
            color: #333;
        }

        .place-number {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .winner-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .winner-score {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
        }

        .winner-details {
            font-size: 14px;
            margin-top: 10px;
            opacity: 0.9;
        }

        .competition-block {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 5px solid #2a5298;
        }

        .competition-block h3 {
            color: #1e3c72;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .winner-list {
            list-style: none;
            padding: 0;
        }

        .winner-list li {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .winner-list li.gold {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            font-weight: bold;
        }

        .winner-list li.silver {
            background: linear-gradient(135deg, #c0c0c0 0%, #e8e8e8 100%);
        }

        .skins-detail {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }

        .alert {
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .print-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px auto;
            display: block;
        }

        @media print {
            body {
                background: white;
            }
            .tab-group, .form-group, .print-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 Tournament Presentation</h1>
            <div class="tournament-name" id="tournamentName">Tournament Results</div>
        </div>

        <div class="card">
            <div class="tab-group">
                <button class="tab-btn active" onclick="showView('daily')">Daily Results</button>
                <button class="tab-btn" onclick="showView('overall')">Overall Tournament</button>
            </div>

            <div id="daily-controls">
                <div class="form-group">
                    <label for="roundSelect" style="font-weight: 600; font-size: 18px; margin-bottom: 10px; display: block;">Select Round:</label>
                    <select id="roundSelect" onchange="loadPresentation()">
                        <option value="">-- Select Round --</option>
                    </select>
                </div>
            </div>

            <div id="presentation-container">
                <div class="alert alert-info">
                    Select a round to view presentation
                </div>
            </div>

            <button class="print-btn" onclick="window.print()" style="display: none;" id="printBtn">🖨️ Print Presentation</button>
        </div>
    </div>

    <script>
        let tournamentData = null;
        let teamsData = null;
        let currentView = 'daily';
        let adminAuthenticated = false;

        function init() {
            checkAdminAccess();
        }

        function checkAdminAccess() {
            // Check if admin key is in sessionStorage
            const adminKey = sessionStorage.getItem('adminKey');
            
            if (adminKey === 'admin-presentation-2026') {
                adminAuthenticated = true;
                loadData();
                populateRoundSelect();
                if (tournamentData) {
                    document.getElementById('tournamentName').textContent = tournamentData.tournament.name || 'Tournament Results';
                }
            } else {
                // Show simple password prompt
                const key = prompt('This page is for tournament administrators only.\nPlease enter the admin key:');
                
                if (key === 'admin-presentation-2026') {
                    sessionStorage.setItem('adminKey', key);
                    adminAuthenticated = true;
                    loadData();
                    populateRoundSelect();
                    if (tournamentData) {
                        document.getElementById('tournamentName').textContent = tournamentData.tournament.name || 'Tournament Results';
                    }
                } else {
                    alert('Access denied. This page is for administrators only.');
                    window.location.href = 'index.html';
                }
            }
        }

        function loadData() {
            const saved = localStorage.getItem('golfTournamentData');
            if (saved) {
                tournamentData = JSON.parse(saved);
            }
            
            const teamsSaved = localStorage.getItem('golfTeamsData');
            if (teamsSaved) {
                teamsData = JSON.parse(teamsSaved);
            }
        }

        function populateRoundSelect() {
            const select = document.getElementById('roundSelect');
            select.innerHTML = '<option value="">-- Select Round --</option>';
            
            if (tournamentData && tournamentData.rounds) {
                tournamentData.rounds.forEach((round, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = `Round ${round.number}${round.date ? ' - ' + round.date : ''}`;
                    select.appendChild(option);
                });
            }
        }

        function showView(view) {
            currentView = view;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (view === 'daily') {
                document.getElementById('daily-controls').style.display = 'block';
                loadPresentation();
            } else {
                document.getElementById('daily-controls').style.display = 'none';
                loadOverallPresentation();
            }
        }

        function loadPresentation() {
            const roundIndex = parseInt(document.getElementById('roundSelect').value);
            
            if (isNaN(roundIndex)) {
                document.getElementById('presentation-container').innerHTML = 
                    '<div class="alert alert-info">Select a round to view presentation</div>';
                document.getElementById('printBtn').style.display = 'none';
                return;
            }
            
            displayDailyPresentation(roundIndex);
            document.getElementById('printBtn').style.display = 'block';
        }

        function displayDailyPresentation(roundIndex) {
            const container = document.getElementById('presentation-container');
            const round = tournamentData.rounds[roundIndex];
            
            let html = `<h2 style="text-align: center; color: #1e3c72; margin-bottom: 30px; font-size: 32px;">Round ${round.number} Results</h2>`;
            
            // Net Stableford
            html += renderStablefordSection(roundIndex, true);
            
            // Gross Stableford
            html += renderStablefordSection(roundIndex, false);
            
            // Net Skins
            html += renderSkinsSection(roundIndex, true);
            
            // Gross Skins
            html += renderSkinsSection(roundIndex, false);
            
            // Best Ball
            html += renderBestBallSection(roundIndex);
            
            // Eclectic
            html += renderEclecticSection();
            
            // Special Prizes
            html += renderSpecialPrizesSection(roundIndex);
            
            container.innerHTML = html;
        }

        function loadOverallPresentation() {
            const container = document.getElementById('presentation-container');
            
            let html = '<h2 style="text-align: center; color: #1e3c72; margin-bottom: 30px; font-size: 32px;">Overall Tournament Results</h2>';
            
            // Overall Net Stableford
            html += renderOverallStableford(true);
            
            // Overall Gross Stableford
            html += renderOverallStableford(false);
            
            // Overall Net Skins
            html += renderOverallSkins(true);
            
            // Overall Gross Skins
            html += renderOverallSkins(false);
            
            // Overall Eclectic
            html += renderOverallEclectic();
            
            container.innerHTML = html;
            document.getElementById('printBtn').style.display = 'block';
        }

        function renderStablefordSection(roundIndex, useNet) {
            const results = calculateRoundStableford(roundIndex, useNet);
            
            if (results.length === 0) return '';
            
            const top3 = results.slice(0, 3);
            
            let html = `<div class="winner-section">`;
            html += `<h2>${useNet ? 'Net' : 'Gross'} Stableford</h2>`;
            html += '<div class="podium">';
            
            top3.forEach((player, index) => {
                const placeClass = index === 0 ? 'first' : index === 1 ? 'second' : 'third';
                const placeNum = index === 0 ? '🥇' : index === 1 ? '🥈' : '🥉';
                
                html += `<div class="podium-place ${placeClass}">`;
                html += `<div class="place-number">${placeNum}</div>`;
                html += `<div class="winner-name">${player.playerName}</div>`;
                html += `<div class="winner-score">${player.totalPoints} points</div>`;
                if (player.countbackUsed) {
                    html += `<div class="winner-details">Won on countback</div>`;
                }
                html += '</div>';
            });
            
            html += '</div></div>';
            
            return html;
        }

        function renderSkinsSection(roundIndex, useNet) {
            const skinsData = calculateDailySkins(roundIndex, useNet);
            
            if (!skinsData || skinsData.playerTotals.length === 0) return '';
            
            let html = `<div class="competition-block">`;
            html += `<h3>${useNet ? 'Net' : 'Gross'} Skins Winners</h3>`;
            html += '<ul class="winner-list">';
            
            skinsData.playerTotals.slice(0, 3).forEach((player, index) => {
                const classAdd = index === 0 ? 'gold' : index === 1 ? 'silver' : '';
                html += `<li class="${classAdd}">`;
                html += `<span>${player.playerName}</span>`;
                html += `<span><strong>${player.skinsWon} skin${player.skinsWon > 1 ? 's' : ''}</strong></span>`;
                html += '</li>';
                
                // Add hole details
                const playerSkins = skinsData.holeWinners.filter(hw => hw.winner === player.playerName);
                if (playerSkins.length > 0) {
                    html += '<div class="skins-detail">Holes: ';
                    html += playerSkins.map(s => `${s.hole}${s.skinsWon > 1 ? '(+' + (s.skinsWon-1) + ')' : ''}`).join(', ');
                    html += '</div>';
                }
            });
            
            html += '</ul></div>';
            
            return html;
        }

        function renderBestBallSection(roundIndex) {
            if (!teamsData || !teamsData.bestBall || !teamsData.bestBall[roundIndex]) {
                return '';
            }
            
            const teams = teamsData.bestBall[roundIndex];
            const round = tournamentData.rounds[roundIndex];
            
            const results = teams.map(team => calculateBestBall(team, round, roundIndex)).sort((a, b) => b.totalPoints - a.totalPoints);
            
            if (results.length === 0) return '';
            
            let html = `<div class="competition-block">`;
            html += `<h3>Best Ball (4BBB) Winners</h3>`;
            html += '<ul class="winner-list">';
            
            results.slice(0, 2).forEach((result, index) => {
                const classAdd = index === 0 ? 'gold' : 'silver';
                html += `<li class="${classAdd}">`;
                html += `<div>`;
                html += `<div><strong>${result.team.name}</strong></div>`;
                html += `<div style="font-size: 13px; color: #666; margin-top: 5px;">`;
                html += result.team.players.map(p => p.name).join(', ');
                html += '</div></div>';
                html += `<span><strong>${result.totalPoints} points</strong></span>`;
                html += '</li>';
            });
            
            html += '</ul></div>';
            
            return html;
        }

        function renderOverallStableford(useNet) {
            const results = calculateOverallStableford(useNet);
            
            if (results.length === 0) return '';
            
            const top3 = results.slice(0, 3);
            
            let html = `<div class="winner-section">`;
            html += `<h2>Overall ${useNet ? 'Net' : 'Gross'} Stableford</h2>`;
            html += '<div class="podium">';
            
            top3.forEach((player, index) => {
                const placeClass = index === 0 ? 'first' : index === 1 ? 'second' : 'third';
                const placeNum = index === 0 ? '🥇' : index === 1 ? '🥈' : '🥉';
                
                html += `<div class="podium-place ${placeClass}">`;
                html += `<div class="place-number">${placeNum}</div>`;
                html += `<div class="winner-name">${player.playerName}</div>`;
                html += `<div class="winner-score">${player.totalPoints} points</div>`;
                html += `<div class="winner-details">${player.rounds.length} round${player.rounds.length > 1 ? 's' : ''} played</div>`;
                html += '</div>';
            });
            
            html += '</div></div>';
            
            return html;
        }

        function renderOverallSkins(useNet) {
            const allSkins = calculateOverallSkins(useNet);
            
            if (allSkins.length === 0) return '';
            
            let html = `<div class="competition-block">`;
            html += `<h3>Overall ${useNet ? 'Net' : 'Gross'} Skins Winners</h3>`;
            html += '<ul class="winner-list">';
            
            allSkins.slice(0, 3).forEach((player, index) => {
                const classAdd = index === 0 ? 'gold' : index === 1 ? 'silver' : '';
                html += `<li class="${classAdd}">`;
                html += `<span>${player.playerName}</span>`;
                html += `<span><strong>${player.skinsWon} skin${player.skinsWon > 1 ? 's' : ''}</strong></span>`;
                html += '</li>';
            });
            
            html += '</ul></div>';
            
            return html;
        }

        function renderOverallEclectic() {
            const eclecticData = calculateEclectic();
            
            if (!eclecticData || eclecticData.length === 0) return '';
            
            const top3 = eclecticData.slice(0, 3);
            
            let html = `<div class="winner-section">`;
            html += `<h2>Overall Eclectic</h2>`;
            html += '<div class="podium">';
            
            top3.forEach((player, index) => {
                const placeClass = index === 0 ? 'first' : index === 1 ? 'second' : 'third';
                const placeNum = index === 0 ? '🥇' : index === 1 ? '🥈' : '🥉';
                
                html += `<div class="podium-place ${placeClass}">`;
                html += `<div class="place-number">${placeNum}</div>`;
                html += `<div class="winner-name">${player.player.name}</div>`;
                html += `<div class="winner-score">${player.total}</div>`;
                html += `<div class="winner-details">${player.holesCompleted} of 18 holes</div>`;
                html += '</div>';
            });
            
            html += '</div></div>';
            
            return html;
        }

        // Calculation functions (imported from other files)
        function calculateRoundStableford(roundIndex, useNet) {
            // Simplified - reuse logic from stableford-leaderboard.html
            const results = [];
            const round = tournamentData.rounds[roundIndex];
            
            if (!round.scores) return [];
            
            tournamentData.players.forEach(player => {
                if (round.scores[player.id]) {
                    const result = calculatePlayerRoundStableford(player.id, roundIndex, useNet);
                    if (result) results.push(result);
                }
            });
            
            results.sort((a, b) => b.totalPoints - a.totalPoints);
            return results;
        }

        function calculatePlayerRoundStableford(playerId, roundIndex, useNet) {
            const player = tournamentData.players.find(p => p.id === playerId);
            const round = tournamentData.rounds[roundIndex];
            const scores = round.scores[playerId];
            
            let totalPoints = 0;
            
            for (let i = 0; i < 18; i++) {
                const hole = tournamentData.course.holes[i];
                const grossScore = scores[i];
                
                if (grossScore && grossScore > 0) {
                    let scoreToUse = grossScore;
                    if (useNet) {
                        const strokes = getStrokesReceived(player.playingHandicap, hole.strokeIndex);
                        scoreToUse = grossScore - strokes;
                    }
                    totalPoints += getStablefordPoints(scoreToUse, hole.par);
                }
            }
            
            return {
                playerId: playerId,
                playerName: player.name,
                totalPoints: totalPoints
            };
        }

        function calculateOverallStableford(useNet) {
            const playerTotals = new Map();
            
            tournamentData.rounds.forEach((round, roundIndex) => {
                tournamentData.players.forEach(player => {
                    if (round.scores && round.scores[player.id]) {
                        const result = calculatePlayerRoundStableford(player.id, roundIndex, useNet);
                        if (result) {
                            if (!playerTotals.has(player.id)) {
                                playerTotals.set(player.id, {
                                    playerName: player.name,
                                    totalPoints: 0,
                                    rounds: []
                                });
                            }
                            const total = playerTotals.get(player.id);
                            total.totalPoints += result.totalPoints;
                            total.rounds.push(result);
                        }
                    }
                });
            });
            
            const results = Array.from(playerTotals.values());
            results.sort((a, b) => b.totalPoints - a.totalPoints);
            return results;
        }

        function calculateDailySkins(roundIndex, useNet) {
            // Simplified skins calculation
            const round = tournamentData.rounds[roundIndex];
            if (!round.scores) return null;
            
            const holeWinners = [];
            const playerSkinsCount = new Map();
            let carryover = 0;
            
            for (let holeNum = 0; holeNum < 18; holeNum++) {
                const hole = tournamentData.course.holes[holeNum];
                const holeScores = [];
                
                tournamentData.players.forEach(player => {
                    if (round.scores[player.id]) {
                        const grossScore = round.scores[player.id][holeNum];
                        if (grossScore && grossScore > 0) {
                            let scoreToCompare = grossScore;
                            if (useNet) {
                                const strokes = getStrokesReceived(player.playingHandicap, hole.strokeIndex);
                                scoreToCompare = grossScore - strokes;
                            }
                            holeScores.push({
                                playerName: player.name,
                                scoreToCompare: scoreToCompare
                            });
                        }
                    }
                });
                
                if (holeScores.length === 0) continue;
                
                const lowestScore = Math.min(...holeScores.map(s => s.scoreToCompare));
                const winners = holeScores.filter(s => s.scoreToCompare === lowestScore);
                
                carryover += 1;
                
                if (winners.length === 1) {
                    const winner = winners[0];
                    const current = playerSkinsCount.get(winner.playerName) || 0;
                    playerSkinsCount.set(winner.playerName, current + carryover);
                    
                    holeWinners.push({
                        hole: holeNum + 1,
                        winner: winner.playerName,
                        skinsWon: carryover
                    });
                    
                    carryover = 0;
                }
            }
            
            const playerTotals = Array.from(playerSkinsCount.entries())
                .map(([name, count]) => ({ playerName: name, skinsWon: count }))
                .sort((a, b) => b.skinsWon - a.skinsWon);
            
            return { holeWinners, playerTotals };
        }

        function calculateOverallSkins(useNet) {
            const playerTotals = new Map();
            
            tournamentData.rounds.forEach((round, roundIndex) => {
                const skinsData = calculateDailySkins(roundIndex, useNet);
                if (skinsData) {
                    skinsData.playerTotals.forEach(pt => {
                        const current = playerTotals.get(pt.playerName) || 0;
                        playerTotals.set(pt.playerName, current + pt.skinsWon);
                    });
                }
            });
            
            return Array.from(playerTotals.entries())
                .map(([name, count]) => ({ playerName: name, skinsWon: count }))
                .sort((a, b) => b.skinsWon - a.skinsWon);
        }

        function calculateBestBall(team, round, roundIndex) {
            let totalPoints = 0;
            
            for (let holeNum = 0; holeNum < 18; holeNum++) {
                const hole = tournamentData.course.holes[holeNum];
                let bestPoints = 0;
                
                team.players.forEach(player => {
                    if (round.scores[player.id]) {
                        const grossScore = round.scores[player.id][holeNum];
                        if (grossScore && grossScore > 0) {
                            const strokes = getStrokesReceived(player.playingHandicap, hole.strokeIndex);
                            const netScore = grossScore - strokes;
                            const points = getStablefordPoints(netScore, hole.par);
                            bestPoints = Math.max(bestPoints, points);
                        }
                    }
                });
                
                totalPoints += bestPoints;
            }
            
            return { team, totalPoints };
        }

        function renderSpecialPrizesSection(roundIndex) {
            // Load special prizes data
            const prizesSaved = localStorage.getItem('golfSpecialPrizes');
            if (!prizesSaved) return '';
            
            const specialPrizes = JSON.parse(prizesSaved);
            const prizes = specialPrizes[roundIndex];
            
            if (!prizes) return '';
            
            let html = '';
            
            // Long Drive
            if (prizes.longDrive && (prizes.longDrive.below || prizes.longDrive.above)) {
                html += `<div class="competition-block">`;
                html += `<h3>🏌️ Long Drive Winners</h3>`;
                html += '<ul class="winner-list">';
                
                if (prizes.longDrive.below) {
                    html += `<li class="gold">`;
                    html += `<div><strong>Below HCP ${prizes.longDrive.handicapCutoff}</strong><br>`;
                    html += `<span style="font-size: 18px;">${prizes.longDrive.below.playerName}</span></div>`;
                    html += `<span>Hole ${prizes.longDrive.below.hole}</span>`;
                    html += '</li>';
                }
                
                if (prizes.longDrive.above) {
                    html += `<li class="silver">`;
                    html += `<div><strong>Above HCP ${prizes.longDrive.handicapCutoff}</strong><br>`;
                    html += `<span style="font-size: 18px;">${prizes.longDrive.above.playerName}</span></div>`;
                    html += `<span>Hole ${prizes.longDrive.above.hole}</span>`;
                    html += '</li>';
                }
                
                html += '</ul></div>';
            }
            
            // Nearest to Pin
            if (prizes.ntp && prizes.ntp.length > 0) {
                html += `<div class="competition-block">`;
                html += `<h3>🎯 Nearest to Pin Winners</h3>`;
                html += '<ul class="winner-list">';
                
                prizes.ntp.forEach((ntp, index) => {
                    const classAdd = index === 0 ? 'gold' : '';
                    html += `<li class="${classAdd}">`;
                    html += `<div><strong>Hole ${ntp.hole}</strong><br>`;
                    html += `<span style="font-size: 18px;">${ntp.playerName}</span></div>`;
                    if (ntp.distance) {
                        html += `<span style="font-size: 20px; font-weight: bold; color: #f5576c;">${ntp.distance}m</span>`;
                    } else {
                        html += '<span>Winner</span>';
                    }
                    html += '</li>';
                });
                
                html += '</ul></div>';
            }
            
            return html;
        }

        function renderEclecticSection() {
            const eclecticData = calculateEclectic();
            
            if (!eclecticData || eclecticData.length === 0) return '';
            
            const top3 = eclecticData.slice(0, 3);
            
            let html = `<div class="competition-block">`;
            html += `<h3>🏅 Eclectic Leaders</h3>`;
            html += '<p style="color: #666; margin-bottom: 15px;">Best net score per hole across all rounds</p>';
            html += '<ul class="winner-list">';
            
            top3.forEach((player, index) => {
                const classAdd = index === 0 ? 'gold' : index === 1 ? 'silver' : '';
                html += `<li class="${classAdd}">`;
                html += `<span>${player.player.name}</span>`;
                html += `<span><strong>${player.total}</strong> (${player.holesCompleted}/18 holes)</span>`;
                html += '</li>';
            });
            
            html += '</ul></div>';
            
            return html;
        }

        function calculateEclectic() {
            const eclecticData = [];

            tournamentData.players.forEach(player => {
                const bestScores = Array(18).fill(null);

                tournamentData.rounds.forEach((round, roundIndex) => {
                    if (round.scores && round.scores[player.id]) {
                        for (let holeNum = 0; holeNum < 18; holeNum++) {
                            const hole = tournamentData.course.holes[holeNum];
                            const grossScore = round.scores[player.id][holeNum];
                            
                            if (grossScore && grossScore > 0) {
                                const strokesReceived = getStrokesReceived(player.playingHandicap, hole.strokeIndex);
                                const netScore = grossScore - strokesReceived;
                                
                                if (bestScores[holeNum] === null || netScore < bestScores[holeNum]) {
                                    bestScores[holeNum] = netScore;
                                }
                            }
                        }
                    }
                });

                const total = bestScores.reduce((sum, score) => {
                    return score !== null ? sum + score : sum;
                }, 0);

                const holesCompleted = bestScores.filter(s => s !== null).length;

                if (holesCompleted > 0) {
                    eclecticData.push({
                        player: player,
                        bestScores: bestScores,
                        total: total,
                        holesCompleted: holesCompleted
                    });
                }
            });

            eclecticData.sort((a, b) => {
                if (a.holesCompleted !== b.holesCompleted) {
                    return b.holesCompleted - a.holesCompleted;
                }
                return a.total - b.total;
            });

            return eclecticData;
        }

        function getStrokesReceived(playingHandicap, strokeIndex) {
            if (playingHandicap <= 0) return 0;
            if (playingHandicap >= strokeIndex) {
                return Math.floor(playingHandicap / 18) + 1;
            } else if (playingHandicap >= strokeIndex - 18) {
                return 1;
            }
            return 0;
        }

        function getStablefordPoints(netScore, par) {
            if (!netScore || netScore <= 0) return 0;
            const relative = netScore - par;
            if (relative <= -2) return 4;
            if (relative === -1) return 3;
            if (relative === 0) return 2;
            if (relative === 1) return 1;
            return 0;
        }

        init();
    </script>
