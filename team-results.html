<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Competition Results</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            color: #1e3c72;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .tab-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 20px;
            background: #e9ecef;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #2a5298;
            color: white;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        select {
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .leaderboard-table th,
        .leaderboard-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .leaderboard-table th {
            background: #f8f9fa;
            font-weight: 600;
        }

        .leaderboard-table tr:hover {
            background: #f8f9fa;
        }

        .pos-1 {
            background: #ffd70033 !important;
            font-weight: bold;
        }

        .pos-2 {
            background: #c0c0c033 !important;
        }

        .team-detail {
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
        }

        .section-title {
            margin-top: 30px;
            margin-bottom: 15px;
            color: #1e3c72;
            font-size: 20px;
            font-weight: bold;
        }

        .hole-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #2a5298;
        }

        .hole-card.carryover {
            border-left-color: #ffc107;
            background: #fff9e6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 Team Competition Results</h1>
            <p style="color: #6c757d;">View Best Ball and Ambrose results</p>
        </div>

        <div class="card">
            <div class="tab-group">
                <button class="tab-btn active" onclick="showView('bestball')">Best Ball Results</button>
                <button class="tab-btn" onclick="showView('ambrose')">Ambrose Results</button>
                <button class="tab-btn" onclick="showView('ambrose-skins')">Ambrose Skins</button>
            </div>

            <div id="round-controls">
                <div class="form-group" style="max-width: 300px;">
                    <label for="roundSelect">Select Round:</label>
                    <select id="roundSelect" onchange="updateResults()">
                        <option value="">-- Select Round --</option>
                    </select>
                </div>
            </div>

            <div id="results-container">
                <p style="color: #6c757d;">Select a round to view results</p>
            </div>
        </div>
    </div>

    <script>
        let tournamentData = null;
        let teamsData = null;
        let currentView = 'bestball';
        let selectedRound = null;

        function init() {
            loadData();
            populateRoundSelect();
        }

        function loadData() {
            const saved = localStorage.getItem('golfTournamentData');
            if (saved) {
                tournamentData = JSON.parse(saved);
            }
            
            const teamsSaved = localStorage.getItem('golfTeamsData');
            if (teamsSaved) {
                teamsData = JSON.parse(teamsSaved);
            }
        }

        function populateRoundSelect() {
            const select = document.getElementById('roundSelect');
            select.innerHTML = '<option value="">-- Select Round --</option>';
            
            if (tournamentData && tournamentData.rounds) {
                tournamentData.rounds.forEach((round, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = `Round ${round.number}${round.date ? ' - ' + round.date : ''}`;
                    select.appendChild(option);
                });
            }
        }

        function showView(view) {
            currentView = view;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            updateResults();
        }

        function updateResults() {
            const roundIndex = parseInt(document.getElementById('roundSelect').value);
            
            if (isNaN(roundIndex)) {
                document.getElementById('results-container').innerHTML = 
                    '<p style="color: #6c757d;">Select a round to view results</p>';
                return;
            }
            
            selectedRound = roundIndex;
            
            if (currentView === 'bestball') {
                displayBestBallResults(roundIndex);
            } else if (currentView === 'ambrose') {
                displayAmbroseResults(roundIndex);
            } else if (currentView === 'ambrose-skins') {
                displayAmbroseSkins(roundIndex);
            }
        }

        function displayBestBallResults(roundIndex) {
            const container = document.getElementById('results-container');
            
            if (!teamsData || !teamsData.bestBall || !teamsData.bestBall[roundIndex]) {
                container.innerHTML = '<div class="alert alert-warning">No Best Ball teams created for this round. Please create teams in Team Management.</div>';
                return;
            }
            
            const teams = teamsData.bestBall[roundIndex];
            const round = tournamentData.rounds[roundIndex];
            
            if (!round.scores) {
                container.innerHTML = '<div class="alert alert-info">No scores entered yet for this round.</div>';
                return;
            }
            
            // Calculate results for each team
            const results = teams.map(team => {
                return calculateBestBall(team, round, roundIndex);
            });
            
            // Sort by points
            results.sort((a, b) => b.totalPoints - a.totalPoints);
            
            // Render
            let html = '<h2>Best Ball (4BBB) Results</h2>';
            html += '<p style="color: #6c757d; margin-bottom: 20px;">Net best ball - best Stableford points per hole count for team</p>';
            
            html += '<table class="leaderboard-table"><thead><tr>';
            html += '<th>Pos</th><th>Team</th><th>Players</th><th>Points</th>';
            html += '</tr></thead><tbody>';
            
            results.forEach((result, index) => {
                const rowClass = index === 0 ? 'pos-1' : index === 1 ? 'pos-2' : '';
                html += `<tr class="${rowClass}">`;
                html += `<td>${index + 1}</td>`;
                html += `<td><strong>${result.team.name}</strong></td>`;
                html += `<td>`;
                result.team.players.forEach(p => {
                    html += `${p.name}<br>`;
                });
                html += `</td>`;
                html += `<td><strong>${result.totalPoints}</strong></td>`;
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            
            // Add detailed breakdown
            html += '<div class="section-title">📢 Presentation Details</div>';
            results.forEach((result, index) => {
                const bgColor = index === 0 ? '#ffd70033' : index === 1 ? '#c0c0c033' : '#f8f9fa';
                html += `<div style="background: ${bgColor}; padding: 20px; border-radius: 8px; margin-bottom: 15px;">`;
                html += `<h3 style="color: #1e3c72;">${index + 1}. ${result.team.name} - ${result.totalPoints} points</h3>`;
                html += '<div class="team-detail">Team members: ';
                html += result.team.players.map(p => `${p.name} (${p.playingHandicap})`).join(', ');
                html += '</div>';
                html += `<div class="team-detail" style="margin-top: 10px;">Front 9: ${result.front9} pts | Back 9: ${result.back9} pts</div>`;
                html += '</div>';
            });
            
            container.innerHTML = html;
        }

        function calculateBestBall(team, round, roundIndex) {
            let totalPoints = 0;
            let front9 = 0;
            let back9 = 0;
            
            for (let holeNum = 0; holeNum < 18; holeNum++) {
                const hole = tournamentData.course.holes[holeNum];
                let bestPoints = 0;
                
                // Get best Stableford points from team members
                team.players.forEach(player => {
                    if (round.scores[player.id]) {
                        const grossScore = round.scores[player.id][holeNum];
                        if (grossScore && grossScore > 0) {
                            const strokesReceived = getStrokesReceived(player.playingHandicap, hole.strokeIndex);
                            const netScore = grossScore - strokesReceived;
                            const points = getStablefordPoints(netScore, hole.par);
                            bestPoints = Math.max(bestPoints, points);
                        }
                    }
                });
                
                totalPoints += bestPoints;
                if (holeNum < 9) front9 += bestPoints;
                else back9 += bestPoints;
            }
            
            return {
                team: team,
                totalPoints: totalPoints,
                front9: front9,
                back9: back9
            };
        }

        function displayAmbroseResults(roundIndex) {
            const container = document.getElementById('results-container');
            
            if (!teamsData || !teamsData.ambrose || !teamsData.ambrose[roundIndex]) {
                container.innerHTML = '<div class="alert alert-warning">No Ambrose teams created for this round. Please create teams in Team Management.</div>';
                return;
            }
            
            const data = teamsData.ambrose[roundIndex];
            const teams = data.teams;
            
            // Load Ambrose scores
            const ambroseScoresSaved = localStorage.getItem('ambroseScores');
            if (!ambroseScoresSaved) {
                container.innerHTML = '<div class="alert alert-info">No Ambrose scores entered yet. Teams need to enter scores in the Ambrose Scoring interface.</div>';
                showTeamList(teams);
                return;
            }
            
            const ambroseScores = JSON.parse(ambroseScoresSaved);
            const results = [];
            
            // Calculate results for each team
            teams.forEach((team, teamIndex) => {
                const scores = ambroseScores[roundIndex] ? ambroseScores[roundIndex][teamIndex] : null;
                
                if (!scores) {
                    results.push({
                        team: team,
                        totalPoints: 0,
                        totalStrokes: 0,
                        holesPlayed: 0
                    });
                    return;
                }
                
                let totalPoints = 0;
                let totalStrokes = 0;
                let holesPlayed = 0;
                
                for (let holeNum = 0; holeNum < 18; holeNum++) {
                    const grossScore = scores[holeNum];
                    if (grossScore && grossScore > 0) {
                        const hole = tournamentData.course.holes[holeNum];
                        const strokes = getStrokesReceived(team.teamHandicap, hole.strokeIndex);
                        const netScore = grossScore - strokes;
                        totalPoints += getStablefordPoints(netScore, hole.par);
                        totalStrokes += grossScore;
                        holesPlayed++;
                    }
                }
                
                results.push({
                    team: team,
                    totalPoints: totalPoints,
                    totalStrokes: totalStrokes,
                    holesPlayed: holesPlayed
                });
            });
            
            // Sort by points descending
            results.sort((a, b) => {
                if (b.totalPoints !== a.totalPoints) {
                    return b.totalPoints - a.totalPoints;
                }
                // If tied on points, lower strokes wins
                return a.totalStrokes - b.totalStrokes;
            });
            
            // Render results
            let html = '<h2>Ambrose Results - Round ' + (roundIndex + 1) + '</h2>';
            html += '<div class="section-title">Leaderboard:</div>';
            html += '<table class="leaderboard-table"><thead><tr>';
            html += '<th>Pos</th><th>Team</th><th>Players</th><th>Team HCP</th><th>Points</th><th>Strokes</th><th>Holes</th>';
            html += '</tr></thead><tbody>';
            
            results.forEach((result, index) => {
                const rowClass = index === 0 ? 'pos-1' : index === 1 ? 'pos-2' : '';
                html += `<tr class="${rowClass}">`;
                html += `<td>${index + 1}</td>`;
                html += `<td><strong>${result.team.name}</strong></td>`;
                html += `<td>${result.team.players.map(p => p.name).join(', ')}</td>`;
                html += `<td>${result.team.teamHandicap}</td>`;
                html += `<td><strong>${result.totalPoints}</strong></td>`;
                html += `<td>${result.totalStrokes}</td>`;
                html += `<td>${result.holesPlayed}/18</td>`;
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function showTeamList(teams) {
            const container = document.getElementById('results-container');
            let html = '<div class="section-title">Teams Configured:</div>';
            
            teams.forEach(team => {
                html += `<div class="hole-card">`;
                html += `<h4>${team.name} (Team HCP: ${team.teamHandicap})</h4>`;
                html += '<p>Players: ';
                html += team.players.map(p => `${p.name} (${p.playingHandicap})`).join(', ');
                html += '</p></div>';
            });
            
            container.innerHTML += html;
        }

        function displayAmbroseSkins(roundIndex) {
            const container = document.getElementById('results-container');
            
            if (!teamsData || !teamsData.ambrose || !teamsData.ambrose[roundIndex]) {
                container.innerHTML = '<div class="alert alert-warning">No Ambrose teams created for this round.</div>';
                return;
            }
            
            const data = teamsData.ambrose[roundIndex];
            
            if (!data.skinsEnabled) {
                container.innerHTML = '<div class="alert alert-info">Ambrose Skins are not enabled for this round. Enable in Team Management.</div>';
                return;
            }
            
            container.innerHTML = '<div class="alert alert-info">Ambrose Skins tracking requires manual score entry per team. This feature is coming soon!</div>';
        }

        function getStrokesReceived(playingHandicap, strokeIndex) {
            if (playingHandicap <= 0) return 0;
            if (playingHandicap >= strokeIndex) {
                return Math.floor(playingHandicap / 18) + 1;
            } else if (playingHandicap >= strokeIndex - 18) {
                return 1;
            }
            return 0;
        }

        function getStablefordPoints(netScore, par) {
            if (netScore === null || netScore <= 0) return 0;
            const relative = netScore - par;
            if (relative <= -2) return 4;
            if (relative === -1) return 3;
            if (relative === 0) return 2;
            if (relative === 1) return 1;
            return 0;
        }

        init();
    </script>
</body>
</html>
